name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ]
    # Only trigger when changes are made to the backend folder or this workflow itself
    paths:
      - 'backend/**'
      - '.github/workflows/huggingface-sync.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git credentials
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Clone the Hugging Face repository using the HF_TOKEN
          # We use the space URL format: https://<username>:<token>@huggingface.co/spaces/<username>/<space-name>
          git clone https://manavmerja:$HF_TOKEN@huggingface.co/spaces/manavmerja/gravity-lens-backend hf-space
          
          # Clean the existing files in the HF repository (except git metadata)
          find hf-space -maxdepth 1 ! -name 'hf-space' ! -name '.git' -exec rm -rf {} +
          
          # Copy backend files to the HF repository root
          cp -r backend/* hf-space/
          
          # Commit and push to Hugging Face
          cd hf-space
          git add .
          
          # Only commit and push if there are changes to avoid empty commits/errors
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Sync from GitHub commit: ${{ github.sha }}"
            git push origin main
          else
            echo "No changes in backend folder to sync."
          fi
